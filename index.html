<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BUBAA</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
      font-family: Arial, sans-serif;
    }

    .container {
      text-align: center;
      padding: 40px 20px;
      width: 100%;
      max-width: 420px;
    }

    .avatar {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      background: linear-gradient(135deg, #e94560, #0f3460);
      margin: 0 auto 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      font-weight: bold;
      color: white;
    }

    h1 {
      color: white;
      font-size: 28px;
      letter-spacing: 4px;
      margin-bottom: 8px;
    }

    .subtitle {
      color: #aaaaaa;
      font-size: 14px;
      margin-bottom: 40px;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      width: 100%;
      padding: 16px;
      margin-bottom: 16px;
      border-radius: 12px;
      text-decoration: none;
      font-size: 16px;
      font-weight: bold;
      transition: transform 0.2s, opacity 0.2s;
    }

    .btn:hover {
      transform: scale(1.03);
      opacity: 0.9;
    }

    .btn-facebook {
      background: #1877f2;
      color: white;
    }

    .btn-whatsapp {
      background: #25d366;
      color: white;
    }

    .icon { font-size: 22px; }

    .footer {
      color: #555555;
      font-size: 12px;
      margin-top: 40px;
    }
  </style>
</head>
<body>
  <div class="container">

    <div class="avatar">B</div>
    <h1>BUBAA</h1>
    <p class="subtitle">Retrouve-moi sur mes réseaux</p>

    <a class="btn btn-facebook"
       href="fb://profile/babs.ndiaye.5477"
       target="_blank">
      <span class="icon">📘</span> Facebook
    </a>

    <a class="btn btn-facebook"
   href="https://www.facebook.com/babs.ndiaye.5477/"
   target="_blank"
   onclick="window.location='fb://profile/babs.ndiaye.5477'; return false;">
      <span class="icon">💬</span> WhatsApp
    </a>

    <p class="footer">© 2026 BUBAA</p>
  </div>
</body>
</html>
